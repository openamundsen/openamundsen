name: Build and upload to PyPI
on:
  release:
    types:
      - published
  push:
    tags:
      - 'v*'

env:
  PYTHON_VERSION: "3.13"

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    if: github.repository == 'openamundsen/openamundsen'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build tarball and wheels
        run: |
          uv build --sdist --wheel .

      - name: Check build artifacts
        run: |
          uv tool run twine check dist/*
          pwd

      - uses: actions/upload-artifact@v6
        with:
          name: releases
          path: dist

  test-built-dist:
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v8
        with:
          name: releases
          path: dist

      - name: List contents of built dist
        run: |
          ls -ltrh
          ls -ltrh dist

      - name: Publish package to TestPyPI
        if: github.event_name == 'push'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

      - name: Check uploaded package
        if: github.event_name == 'push'
        run: |
          sleep 3
          uv venv .venv-test --python ${{ env.PYTHON_VERSION }}
          # Use pip here instead of uv because uv prioritizes the first index
          # that contains a package, which can break resolution when TestPyPI
          # has incomplete or bogus packages that shadow the real PyPI ones.
          .venv-test/bin/python -m pip install --upgrade pip
          .venv-test/bin/python -m pip install --extra-index-url https://test.pypi.org/simple --upgrade openamundsen
          .venv-test/bin/python -c "import openamundsen as oa; print(f'openAMUNDSEN v{oa.__version__}')"

  upload-to-pypi:
    needs: test-built-dist
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: releases
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
